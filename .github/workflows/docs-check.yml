name: docs-check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run docs check
        run: python3 hooks/docs-check.py
